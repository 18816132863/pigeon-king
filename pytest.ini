[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    asyncio: mark test as async
    integration: integration tests
    e2e: end-to-end tests
    slow: slow tests
    device_runtime: requires real device runtime
    connected_runtime: requires Xiaoyi/OpenClaw connected runtime
    probe_only: connected runtime probe without side effects
    side_effecting: may perform real side effects
    l4_strong_confirm: requires strong confirmation
filterwarnings =
    ignore::DeprecationWarning
